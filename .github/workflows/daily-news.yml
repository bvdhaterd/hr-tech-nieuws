name: Daily News Fetch

on:
  schedule:
    - cron: '0 6 * * *'   # Elke dag 06:00 UTC (08:00 Amsterdam zomertijd)
  workflow_dispatch:        # Ook handmatig te starten via GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Nodig om data/news.json te committen

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencies installeren
        run: pip install requests feedparser

      - name: Nieuws ophalen
        run: python scripts/fetch_news.py

      - name: Wijzigingen committen en pushen
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add data/news.json
          git diff --staged --quiet || git commit -m "chore: dagelijkse nieuwsupdate $(date -u +%Y-%m-%d)"
          git push
